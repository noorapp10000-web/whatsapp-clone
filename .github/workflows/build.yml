name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Flutter version info
        run: flutter --version

      - name: Install NDK 28.2.13676358
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMANAGER" "ndk;28.2.13676358"
          echo "✅ NDK installed"

      - name: Write google-services.json
        run: |
          SECRET='${{ secrets.GOOGLE_SERVICES_JSON }}'
          if [ -n "$SECRET" ] && [ "$SECRET" != "" ]; then
            echo "$SECRET" > android/app/google-services.json
            echo "✅ google-services.json written from secret"
          else
            echo "⚠️  GOOGLE_SERVICES_JSON secret not set — using committed google-services.json"
            if [ ! -f android/app/google-services.json ]; then
              echo "❌ No google-services.json found!"
              exit 1
            fi
          fi
          echo "=== project_id ===" && cat android/app/google-services.json | grep project_id | head -1

      - name: Inject Backend URLs into Dart sources
        run: |
          BACKEND='${{ secrets.BACKEND_URL }}'
          BACKEND_WS='${{ secrets.BACKEND_WS_URL }}'
          BACKEND="${BACKEND%/}"
          BACKEND_WS="${BACKEND_WS%/}"
          if [ -n "$BACKEND" ]; then
            sed -i "s|https://YOUR_REPLIT_BACKEND_URL|${BACKEND}|g" lib/services/api_service.dart
            echo "✅ API URL → ${BACKEND}/api"
          else
            echo "⚠️  BACKEND_URL not set — using placeholder"
          fi
          if [ -n "$BACKEND_WS" ]; then
            sed -i "s|wss://YOUR_REPLIT_BACKEND_URL|${BACKEND_WS}|g" lib/services/websocket_service.dart
            echo "✅ WS  URL → ${BACKEND_WS}/ws"
          else
            echo "⚠️  BACKEND_WS_URL not set — using placeholder"
          fi

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      - name: Flutter clean
        run: flutter clean

      - name: Get Flutter dependencies
        run: flutter pub get

      # ───────────────────────────────────────────────────────────────────────
      # FlutterLifecycleAdapter was removed from Flutter 3.29+ but file_picker
      # (all versions 8.x – 10.x) still references it.  Patch the cached
      # source after `flutter pub get` so Gradle compiles cleanly.
      # ───────────────────────────────────────────────────────────────────────
      - name: Patch file_picker (fix FlutterLifecycleAdapter removed in Flutter 3.29+)
        run: |
          FILEPICKER_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -name "file_picker-*" 2>/dev/null | head -1)
          if [ -z "$FILEPICKER_DIR" ]; then
            echo "⚠️  file_picker not found in pub cache — skipping patch"
            exit 0
          fi
          echo "📦 Found: $FILEPICKER_DIR"

          # ── Kotlin source (file_picker 9.x+) ─────────────────────────────
          KT_FILE="$FILEPICKER_DIR/android/src/main/kotlin/com/mr/flutter/plugin/filepicker/FilePickerPlugin.kt"
          if [ -f "$KT_FILE" ]; then
            # Remove the import line
            sed -i '/import io\.flutter\.embedding\.engine\.plugins\.lifecycle\.FlutterLifecycleAdapter/d' "$KT_FILE"
            # Replace usage: FlutterLifecycleAdapter.getActivityLifecycle(foo) → foo.lifecycle as? Lifecycle
            # (cast required: getLifecycle() declared as Object in Java → Any in Kotlin, can't assign to Lifecycle? without cast)
            sed -i 's/FlutterLifecycleAdapter\.getActivityLifecycle(\([^)]*\))/\1.lifecycle as? Lifecycle/g' "$KT_FILE"
            echo "✅ Patched Kotlin source"
            echo "=== Patched lifecycle lines ===" && grep -n "lifecycle" "$KT_FILE" | head -10
          fi

          # ── Java source (file_picker 8.x and below) ───────────────────────
          JAVA_FILE="$FILEPICKER_DIR/android/src/main/java/com/mr/flutter/plugin/filepicker/FilePickerPlugin.java"
          if [ -f "$JAVA_FILE" ]; then
            sed -i '/import io\.flutter\.embedding\.engine\.plugins\.lifecycle\.FlutterLifecycleAdapter;/d' "$JAVA_FILE"
            sed -i 's/FlutterLifecycleAdapter\.getActivityLifecycle(\([^)]*\))/\1.getLifecycle()/g' "$JAVA_FILE"
            echo "✅ Patched Java source"
          fi

          if [ ! -f "$KT_FILE" ] && [ ! -f "$JAVA_FILE" ]; then
            echo "ℹ️  No files matched — file_picker may have already fixed this issue"
          fi

      - name: Build Debug APK
        run: |
          set -o pipefail
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/28.2.13676358"
          flutter build apk --debug --no-tree-shake-icons --verbose 2>&1 | tail -100
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Build Release APK
        run: |
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/28.2.13676358"
          flutter build apk --release --no-tree-shake-icons
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-clone-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-clone-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        continue-on-error: true

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "WhatsApp Clone v${{ github.run_number }} 🚀"
          body: |
            ## 🚀 WhatsApp Clone Build #${{ github.run_number }}

            ### ✅ Features
            - 🔐 Google Sign-In (Firebase Auth)
            - 💬 Real-time messaging (WebSocket)
            - 📞 Voice & Video calls (WebRTC) — echo cancellation enabled
            - 🖥️ Screen sharing
            - 📁 File, image & video sharing (Cloudinary)
            - 🔔 Push notifications (FCM)
            - 👥 Group chats
            - ✅ Message status (sent/delivered/read)
            - 🎤 Voice messages (record & play)
            - 🎵 Listen Together — share music with friends in sync
            - 😄 Emoji reactions (double-tap messages)
            - ⌨️ Typing indicators
            - 🟢 Online status

            ### 📥 Download
            Download **app-debug.apk** from the Assets below.
            Enable "Install from unknown sources" before installing.
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
