name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Copy google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Update API URL
        run: |
          sed -i "s|https://YOUR_REPLIT_URL.replit.app|${{ secrets.BACKEND_URL }}|g" lib/services/api_service.dart
          sed -i "s|wss://YOUR_REPLIT_URL.replit.app|${{ secrets.BACKEND_WS_URL }}|g" lib/services/websocket_service.dart

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (debug)
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-clone-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-clone-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        continue-on-error: true

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: WhatsApp Clone v${{ github.run_number }}
          body: |
            ## 🚀 WhatsApp Clone Build #${{ github.run_number }}
            
            ### Features
            - ✅ Google Sign-In (Firebase Auth)
            - ✅ Real-time messaging (WebSocket)
            - ✅ Voice & Video calls (WebRTC)
            - ✅ Screen sharing
            - ✅ File & image sharing (Cloudinary)
            - ✅ Push notifications (FCM)
            - ✅ Group chats
            
            ### Download
            Download the APK from the artifacts below.
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
