name: Build Flutter APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Flutter version info
        run: flutter --version

      - name: Install NDK 28.2.13676358
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMANAGER" "ndk;28.2.13676358"
          echo "✅ NDK installed"

      - name: Write google-services.json
        run: |
          if [ -n "${GOOGLE_SERVICES_JSON:-}" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ google-services.json written from secret"
          else
            echo "⚠️  GOOGLE_SERVICES_JSON secret not set — using committed google-services.json"
            if [ ! -f android/app/google-services.json ]; then
              echo "❌ No google-services.json found!"
              exit 1
            fi
          fi
          test -s android/app/google-services.json
          echo "✅ Firebase configuration is present"
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Inject Backend URLs into Dart sources
        run: |
          BACKEND="${BACKEND_URL:-https://wa-clone-976d4-production.up.railway.app}"
          BACKEND_WS="${BACKEND_WS_URL:-wss://wa-clone-976d4-production.up.railway.app}"
          BACKEND="${BACKEND%/}"
          BACKEND_WS="${BACKEND_WS%/}"
          sed -i "s|https://YOUR_REPLIT_BACKEND_URL|${BACKEND}|g" lib/services/api_service.dart
          sed -i "s|wss://YOUR_REPLIT_BACKEND_URL|${BACKEND_WS}|g" lib/services/websocket_service.dart
          if grep -R "YOUR_REPLIT_BACKEND_URL" lib/services; then
            echo "❌ A backend URL placeholder remains"
            exit 1
          fi
          echo "✅ API URL configured"
          echo "✅ WebSocket URL configured"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          BACKEND_WS_URL: ${{ secrets.BACKEND_WS_URL }}

      - name: Verify backend health
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 3 \
            https://wa-clone-976d4-production.up.railway.app/health
          echo
          echo "✅ Railway backend is healthy"

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      - name: Flutter clean
        run: flutter clean

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Locate and stage Debug APK
        run: |
          DEST=build/app/outputs/flutter-apk/app-debug.apk
          test -f "$DEST"
          ls -lh "$DEST"

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Locate and stage Release APK
        run: |
          DEST=build/app/outputs/flutter-apk/app-release.apk
          test -f "$DEST"
          ls -lh "$DEST"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-clone-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-clone-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        continue-on-error: true

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "WhatsApp Clone v${{ github.run_number }} 🚀"
          body: |
            ## 🚀 WhatsApp Clone Build #${{ github.run_number }}

            ### ✅ Features
            - 🔐 Google Sign-In (Firebase Auth)
            - 💬 Real-time messaging (WebSocket)
            - 📞 Voice & Video calls (WebRTC) — echo cancellation enabled
            - 🖥️ Screen sharing
            - 📁 File, image & video sharing (Cloudinary)
            - 🔔 Push notifications (FCM)
            - 👥 Group chats
            - ✅ Message status (sent/delivered/read)
            - 🎤 Voice messages (record & play)
            - 🎵 Listen Together — share music with friends in sync
            - 😄 Emoji reactions (double-tap messages)
            - ⌨️ Typing indicators
            - 🟢 Online status

            ### 📥 Download
            Download **app-debug.apk** from the Assets below.
            Enable "Install from unknown sources" before installing.
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
