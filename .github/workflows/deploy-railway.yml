name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'Dockerfile'
      - 'railway.toml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Node.js Backend to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check RAILWAY_TOKEN
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "⚠️  RAILWAY_TOKEN secret is not set."
            echo "    To enable auto-deploy:"
            echo "    1. Go to Railway dashboard → your project → Settings → Tokens"
            echo "    2. Create a project token"
            echo "    3. Add it as RAILWAY_TOKEN in GitHub repo → Settings → Secrets"
            exit 1
          fi
          echo "✅ RAILWAY_TOKEN found — proceeding with deploy"

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli
          railway --version

      - name: Deploy to Railway
        run: |
          railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify deployment health
        run: |
          echo "⏳ Waiting 30s for Railway to spin up..."
          sleep 30
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          if [ -n "$BACKEND_URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BACKEND_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy — HTTP $STATUS"
            else
              echo "⚠️  Backend returned HTTP $STATUS (may still be starting)"
            fi
          else
            echo "⚠️  BACKEND_URL not set — skipping health check"
          fi
