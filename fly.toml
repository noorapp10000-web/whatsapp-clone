app = 'wa-clone-976d4'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  FIREBASE_PROJECT_ID = 'whatsapp-clone-976d4'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[http_service.concurrency]
  type = 'requests'
  hard_limit = 500
  soft_limit = 400

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
