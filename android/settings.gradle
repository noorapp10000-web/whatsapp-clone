pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.7.3" apply false
    id "org.jetbrains.kotlin.android" version "2.0.21" apply false
    id "com.google.gms.google-services" version "4.4.2" apply false
}

// Flutter plugin loader — new declarative approach for Flutter 3.22+
// Includes all Flutter plugin Android projects as Gradle subprojects
def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()
def pluginsFile = new File("${flutterProjectRoot}/.flutter-plugins")
if (pluginsFile.exists()) {
    pluginsFile.eachLine { line ->
        def pluginParts = line.split('=')
        if (pluginParts.length == 2) {
            def pluginName = pluginParts[0].trim()
            def pluginPath = pluginParts[1].trim()
            def androidDir = new File("${pluginPath}/android")
            if (androidDir.exists()) {
                include ":${pluginName}"
                project(":${pluginName}").projectDir = androidDir
            }
        }
    }
}

include ":app"
