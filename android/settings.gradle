pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.7.3" apply false
    id "org.jetbrains.kotlin.android" version "2.0.21" apply false
    id "com.google.gms.google-services" version "4.4.2" apply false
}

// Apply Flutter plugin loader — registers all Flutter plugin Android projects
// with Gradle at settings-evaluation time (required for AGP 8.x / Gradle 8.x)
def localPropertiesFile = file("local.properties")
def flutterSdkPath = null
if (localPropertiesFile.exists()) {
    def props = new Properties()
    localPropertiesFile.withInputStream { props.load(it) }
    flutterSdkPath = props.getProperty("flutter.sdk")
}

if (flutterSdkPath) {
    def pluginLoader = new File("${flutterSdkPath}/packages/flutter_tools/gradle/app_plugin_loader.gradle")
    if (pluginLoader.exists()) {
        apply from: pluginLoader.absolutePath
    }
}

include ":app"
