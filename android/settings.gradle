pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.11.1" apply false
    id "org.jetbrains.kotlin.android" version "2.0.21" apply false
    id "com.google.gms.google-services" version "4.4.2" apply false
}

// Flutter 3.22+ no longer generates .flutter-plugins (key=value format).
// Read .flutter-plugins-dependencies (JSON) instead to include plugin subprojects.
def flutterProjectRoot = rootProject.projectDir.parentFile
def pluginsDepsFile = new File("${flutterProjectRoot}/.flutter-plugins-dependencies")
if (pluginsDepsFile.exists()) {
    def pluginsData = new groovy.json.JsonSlurper().parse(pluginsDepsFile)
    def androidPlugins = pluginsData?.plugins?.android ?: []
    androidPlugins.each { plugin ->
        def pluginPath = plugin.path?.toString()
        if (pluginPath) {
            def androidDir = new File("${pluginPath}/android")
            if (androidDir.exists() && new File("${pluginPath}/android/build.gradle").exists()) {
                include ":${plugin.name}"
                project(":${plugin.name}").projectDir = androidDir
            }
        }
    }
}

include ":app"
