name: whatsapp_clone
description: تطبيق مراسلة متطور عالمي — كل المميزات
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # Networking
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # WebRTC
  flutter_webrtc: ^1.5.2

  # Media
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  video_player: ^2.9.1
  audioplayers: ^6.1.0
  record: ^5.1.2
  photo_view: ^0.15.0

  # Emoji
  emoji_picker_flutter: ^4.5.0

  # Storage & Utils
  sqflite: ^2.3.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Notifications
  flutter_local_notifications: ^17.2.3

  # New Features
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  open_filex: ^4.5.0
  connectivity_plus: ^6.1.4
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  image_cropper: ^8.0.2
  video_compress: ^3.1.2
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
    - assets/animations/
